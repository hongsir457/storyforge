services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: frametale
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/production/.env}
      POSTGRES_DB: frametale`r`n      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frametale -d frametale"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  frametale-backend:
    image: ghcr.io/hongsir457/frametale-backend:main
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://frametale:${POSTGRES_PASSWORD}@postgres:5432/frametale?ssl=disable
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./projects:/app/projects
      - ./vertex_keys:/app/vertex_keys
      - ./claude_data:/home/app/.claude
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1241/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frametale-frontend:
    image: ghcr.io/hongsir457/frametale-frontend:main
    ports:
      - "1241:8080"
    depends_on:
      frametale-backend:
        condition: service_healthy
    restart: unless-stopped




