apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frametale-projects-data
  namespace: ns-qkcc8vj1
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frametale-redis-data
  namespace: ns-qkcc8vj1
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: frametale-postgres
  namespace: ns-qkcc8vj1
  labels:
    app.kubernetes.io/name: frametale-postgres
spec:
  selector:
    app: frametale-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: frametale-postgres
  namespace: ns-qkcc8vj1
  labels:
    app: frametale-postgres
    app.kubernetes.io/name: frametale-postgres
spec:
  serviceName: frametale-postgres
  replicas: 1
  selector:
    matchLabels:
      app: frametale-postgres
  template:
    metadata:
      labels:
        app: frametale-postgres
        app.kubernetes.io/name: frametale-postgres
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: frametale
            - name: POSTGRES_DB
              value: frametale
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: frametale-env
                  key: POSTGRES_PASSWORD
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U frametale -d frametale"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U frametale -d frametale"]
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 0
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: frametale-redis
  namespace: ns-qkcc8vj1
  labels:
    app.kubernetes.io/name: frametale-redis
spec:
  selector:
    app: frametale-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frametale-redis
  namespace: ns-qkcc8vj1
  labels:
    app: frametale-redis
    app.kubernetes.io/name: frametale-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frametale-redis
  template:
    metadata:
      labels:
        app: frametale-redis
        app.kubernetes.io/name: frametale-redis
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          command: ["redis-server", "--appendonly", "yes"]
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: frametale-redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: frametale-backend
  namespace: ns-qkcc8vj1
  labels:
    app.kubernetes.io/name: frametale-backend
spec:
  selector:
    app: frametale-backend
  ports:
    - name: http
      port: 1241
      targetPort: 1241
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frametale-backend
  namespace: ns-qkcc8vj1
  labels:
    app: frametale-backend
    app.kubernetes.io/name: frametale-backend
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: frametale-backend
  template:
    metadata:
      labels:
        app: frametale-backend
        app.kubernetes.io/name: frametale-backend
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: ghcr.io/hongsir457/frametale-backend:main
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 1241
          envFrom:
            - secretRef:
                name: frametale-env
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: frametale-env
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql+asyncpg://frametale:$(POSTGRES_PASSWORD)@frametale-postgres:5432/frametale?ssl=disable
            - name: REDIS_URL
              value: redis://frametale-redis:6379/0
          command: ["sh", "-c"]
          args:
            - >
              exec uv run uvicorn server.app:app --host 0.0.0.0 --port 1241;
          readinessProbe:
            httpGet:
              path: /health
              port: 1241
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 1241
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: "2"
              memory: 3Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: frametale-projects-data
              mountPath: /app/projects
              subPath: projects
            - name: frametale-projects-data
              mountPath: /app/vertex_keys
              subPath: vertex_keys
            - name: frametale-projects-data
              mountPath: /root/.claude
              subPath: claude_data
      volumes:
        - name: frametale-projects-data
          persistentVolumeClaim:
            claimName: frametale-projects-data
---
