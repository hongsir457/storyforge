---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: network-boyqxnosbdrk
  namespace: ns-qkcc8vj1
  labels:
    app.kubernetes.io/name: frametale
    cloud.sealos.io/app-deploy-manager: frametale
    cloud.sealos.io/app-deploy-manager-domain: bjmmuazhczom
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/server-snippet: |
      client_header_buffer_size 64k;
      large_client_header_buffers 4 128k;
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: frametale.studio
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frametale-frontend
                port:
                  number: 80
    - host: www.frametale.studio
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frametale-frontend
                port:
                  number: 80
  tls:
    - hosts:
        - frametale.studio
        - www.frametale.studio
      secretName: frametale-studio-tls

