apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: storyforge-data
  namespace: ns-vg9l39bk
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storyforge
  namespace: ns-vg9l39bk
  labels:
    app: storyforge
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: storyforge
  template:
    metadata:
      labels:
        app: storyforge
    spec:
      automountServiceAccountToken: false
      containers:
        - name: storyforge
          image: ghcr.io/hongsir457/storyforge:main
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 1241
          envFrom:
            - secretRef:
                name: storyforge-env
          readinessProbe:
            httpGet:
              path: /health
              port: 1241
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 1241
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: storyforge-data
              mountPath: /app/projects
      volumes:
        - name: storyforge-data
          persistentVolumeClaim:
            claimName: storyforge-data
---
apiVersion: v1
kind: Service
metadata:
  name: storyforge
  namespace: ns-vg9l39bk
spec:
  selector:
    app: storyforge
  ports:
    - name: http
      port: 80
      targetPort: 1241
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: storyforge
  namespace: ns-vg9l39bk
spec:
  rules:
    - host: bjmmuazhczom.cloud.sealos.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: storyforge
                port:
                  number: 80
