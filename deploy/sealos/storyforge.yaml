apiVersion: v1
kind: Namespace
metadata:
  name: storyforge
  labels:
    app.kubernetes.io/name: storyforge
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: storyforge-data
  namespace: storyforge
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storyforge
  namespace: storyforge
  labels:
    app: storyforge
    app.kubernetes.io/name: storyforge
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: storyforge
  template:
    metadata:
      labels:
        app: storyforge
        app.kubernetes.io/name: storyforge
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: storyforge
          image: ghcr.io/hongsir457/storyforge:main
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 1241
          envFrom:
            - secretRef:
                name: storyforge-env
          readinessProbe:
            httpGet:
              path: /health
              port: 1241
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 1241
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: storyforge-data
              mountPath: /app/projects
      volumes:
        - name: storyforge-data
          persistentVolumeClaim:
            claimName: storyforge-data
---
apiVersion: v1
kind: Service
metadata:
  name: storyforge
  namespace: storyforge
  labels:
    app.kubernetes.io/name: storyforge
spec:
  selector:
    app: storyforge
  ports:
    - name: http
      port: 80
      targetPort: 1241
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: storyforge
  namespace: storyforge
  labels:
    app.kubernetes.io/name: storyforge
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/server-snippet: |
      client_header_buffer_size 64k;
      large_client_header_buffers 4 128k;
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
    - host: bjmmuazhczom.cloud.sealos.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: storyforge
                port:
                  number: 80
